    --bg: #0d0d0d;
    --bg-elev: #161616;
    --bg-card: #131313;
    --line: #2a2a2a;
    --line-soft: #1f1f1f;
    --fg: #ededed;
    --fg-muted: #9a9a9a;
    --fg-dim: #6a6a6a;
    --accent: #ff6b2c;
    --accent-soft: rgba(255, 107, 44, 0.12);
    --green: #79d68b;

    --sans: 'Geist', system-ui, sans-serif;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,107,44,0.10), transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 110%, rgba(121,214,139,0.06), transparent 60%);

  body::after {
    content: '';

  a { color: inherit; text-decoration: none; }

  /* App loading state — shown until React hydrates */
  #boot {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 999;
    transition: opacity 0.4s ease;
  }
  #boot.hide { opacity: 0; pointer-events: none; }
  #boot .b-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    animation: bootpulse 1.2s ease-in-out infinite;
  }
  @keyframes bootpulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  .container { max-width: 1080px; margin: 0 auto; padding: 0 32px; }
  @media (max-width: 640px) { .container { padding: 0 20px; } }

  /* HEADER */

    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    background: rgba(13,13,13,0.72);
    border-bottom: 1px solid var(--line-soft);
  }
  .nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; }
  .brand {
    font-family: var(--mono); font-size: 13px; letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 10px;
  }
  .brand .dot {
    width: 8px; height: 8px; background: var(--green); border-radius: 50%;
    box-shadow: 0 0 0 4px rgba(121,214,139,0.18);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(121,214,139,0.10); }
    50% { box-shadow: 0 0 0 8px rgba(121,214,139,0.04); }
  }
  .nav-links {
    display: flex; gap: 24px;
    font-family: var(--mono); font-size: 12.5px; color: var(--fg-muted);
  }
  .nav-links a { transition: color 0.2s; }
  .nav-links a:hover { color: var(--fg); }
  @media (max-width: 640px) { .nav-links { display: none; } }

  .eyebrow {
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--fg-dim);
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 14px; border: 1px solid var(--line);
    border-radius: 999px; background: var(--bg-elev); margin-bottom: 32px;

  .eyebrow .live {
    width: 6px; height: 6px; border-radius: 50%; background: var(--green);

  .hero h1 {
    font-family: var(--serif); font-weight: 350;
    font-size: clamp(48px, 9vw, 104px); line-height: 0.96;
    letter-spacing: -0.03em; margin-bottom: 28px;

  .hero h1 em {
    font-style: italic; font-weight: 350; color: var(--accent);

  .hero-tagline {
    font-size: 18px; line-height: 1.55; color: var(--fg-muted);

  .hero-tagline strong { color: var(--fg); font-weight: 500; }
  .cta-row { display: flex; flex-wrap: wrap; gap: 12px; }
  .btn {
    font-family: var(--mono); font-size: 13px; padding: 12px 20px;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--bg-elev); color: var(--fg);
    transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;

  .btn:hover {
    border-color: var(--accent); background: var(--accent-soft); transform: translateY(-1px);
  }
  .btn-primary {
    background: var(--accent); border-color: var(--accent);

  .btn-primary:hover { background: #ff7a3d; border-color: #ff7a3d; color: #0d0d0d; }

    background: rgba(121,214,139,0.08); border-color: var(--green); color: var(--green);
  }

  .section-sub {

    text-transform: uppercase; letter-spacing: 0.05em; margin-left: auto;

  .about-text p { font-size: 17px; line-height: 1.7; margin-bottom: 20px; }
  .about-text p:last-child { margin-bottom: 0; }
  .about-text strong { color: var(--accent); font-weight: 500; }
  .about-side { border-left: 1px solid var(--line); padding-left: 24px; }
  .about-side .label {

  .about-side li {

  .contact-grid {
    display: grid; grid-template-columns: 1.2fr 1fr; gap: 48px; align-items: center;

  @media (max-width: 800px) { .contact-grid { grid-template-columns: 1fr; gap: 32px; } }
  .contact-pitch {
    font-family: var(--serif); font-weight: 350;
    font-size: clamp(28px, 4vw, 40px); line-height: 1.15; letter-spacing: -0.02em;
  }
  .contact-pitch em { font-style: italic; color: var(--accent); }
  .contact-cards { display: flex; flex-direction: column; gap: 12px; }
  .contact-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px; background: var(--bg-card);
    border: 1px solid var(--line); border-radius: 10px; transition: all 0.2s;
  }
  .contact-card:hover {
    border-color: var(--accent); background: var(--bg-elev); transform: translateX(4px);
  }
  .contact-card .ck-label {
    font-family: var(--mono); font-size: 11px; color: var(--fg-dim);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;
  }
  .contact-card .ck-value { font-size: 14px; }
  .contact-card .arrow { color: var(--fg-dim); transition: all 0.2s; }
  .contact-card:hover .arrow { color: var(--accent); transform: translate(2px, -2px); }

  /* FOOTER */
  footer { padding: 32px 0 48px; border-top: 1px solid var(--line-soft); }
  .footer-row {
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px; flex-wrap: wrap;
    font-family: var(--mono); font-size: 12px; color: var(--fg-dim);
  }

  /* SCROLL ANIMATIONS */
  .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 0.08s; }
  .reveal-delay-2 { transition-delay: 0.16s; }
  .reveal-delay-3 { transition-delay: 0.24s; }
  .reveal-delay-4 { transition-delay: 0.32s; }

  @media (prefers-reduced-motion: reduce) {
    .reveal { opacity: 1; transform: none; }
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>

// REVEAL HOOK
// ============================================================
function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          obs.disconnect();
        }
      },
      { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

const Reveal = ({ children, delay = 0, as: Tag = 'div', className = '', ...rest }) => {
  const ref = useReveal();
  const cls = ['reveal', delay ? `reveal-delay-${delay}` : '', className].filter(Boolean).join(' ');
  return <Tag ref={ref} className={cls} {...rest}>{children}</Tag>;
};
